spring.application.name=crm-backend
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/crm_db

# -----------------------------------------------------------------
# DEBUGGING: This will print the actual MongoDB queries to your console.
# Remove this line later when you go to production.
